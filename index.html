<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年度 全国教科書採択一覧</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --blue: #1f5fbf;
      --blue-soft: #eef4ff;
      --green: #3d8b40;
      --green-soft: #edf8ee;
      --purple: #7c4d9f;
      --purple-soft: #f4ecfa;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
        "Yu Gothic", Meiryo, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .topbar {
      background: linear-gradient(180deg, #0e4ea7, #1f5fbf);
      color: #fff;
      padding: 16px 20px;
      box-shadow: 0 4px 14px rgba(31, 95, 191, 0.18);
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
    }

    .topbar-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin: 0 0 6px;
    }

    .topbar-sub {
      font-size: 15px;
      opacity: 0.95;
      margin: 0;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .toolbar-row {
      display: grid;
      grid-template-columns: minmax(260px, 1.5fr) minmax(180px, 0.7fr);
      gap: 12px;
    }

    .search-box,
    .filter-box {
      position: relative;
    }

    .search-box input,
    .filter-box select {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      border: 1px solid #d6dbe6;
      background: #fff;
      font-size: 17px;
      padding: 0 16px 0 48px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .filter-box select {
      padding-left: 16px;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #64748b 50%),
        linear-gradient(135deg, #64748b 50%, transparent 50%);
      background-position:
        calc(100% - 22px) 24px,
        calc(100% - 16px) 24px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .search-box input:focus,
    .filter-box select:focus {
      border-color: #76a5f5;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #5b7fc0;
      pointer-events: none;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 2px 0;
      flex-wrap: wrap;
    }

    .result-count {
      font-size: 15px;
      color: #4b5563;
      font-weight: 600;
    }

    .status {
      font-size: 13px;
      color: #6b7280;
    }

    .status.error {
      color: #b91c1c;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .adoption-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #edf1f6;
    }

    .card-title-wrap {
      min-width: 0;
      flex: 1;
    }

    .card-title {
      margin: 0;
      font-size: 21px;
      line-height: 1.35;
      font-weight: 800;
      color: #1f2937;
      word-break: break-word;
    }

    .card-subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: #6b7280;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge-kind.public {
      background: var(--green-soft);
      color: var(--green);
      border-color: #cae8cc;
    }

    .badge-kind.private {
      background: var(--purple-soft);
      color: var(--purple);
      border-color: #e2d0f2;
    }

    .badge-pref {
      background: #f7f8fb;
      color: #667085;
      border-color: #e5e7eb;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .school-block + .school-block {
      margin-top: 18px;
    }

    .school-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #374151;
    }

    .school-label .icon {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #f4f6fb;
      font-size: 12px;
    }

    .subject-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .subject-chip {
      min-width: 72px;
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 14px;
      padding: 10px 12px 8px;
      text-align: center;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
    }

    .subject-name {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 3px;
      font-weight: 600;
    }

    .subject-publisher {
      display: block;
      font-size: 15px;
      color: #111827;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .location-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #6b7280;
      font-size: 14px;
      padding-top: 12px;
      border-top: 1px solid #f0f2f5;
    }

    .empty-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 26px;
      color: #6b7280;
      box-shadow: var(--shadow);
    }

    @media (max-width: 900px) {
      .toolbar-row {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .card-header {
        flex-direction: column;
        align-items: stretch;
      }

      .badges {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="topbar-title">2026年度 全国教科書採択一覧</h1>
      <p id="summaryText" class="topbar-sub">全国 0件のデータを収録 / 現在 0件表示</p>
    </div>
  </header>

  <main class="page">
    <section class="toolbar">
      <div class="toolbar-row">
        <label class="search-box">
          <span class="search-icon">🔎</span>
          <input id="searchInput" type="text" placeholder="市区町村名・学校名・都道府県で検索" />
        </label>

        <label class="filter-box">
          <select id="prefFilter">
            <option value="">都道府県で絞り込み</option>
          </select>
        </label>
      </div>

      <div class="meta-row">
        <div id="resultCount" class="result-count">0件 表示中（全0件）</div>
        <div id="status" class="status">データを読み込み中です...</div>
      </div>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
