<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年度 全国教科書採択一覧</title>
  <style>
    :root { color-scheme: light; --bg:#f6f8fb; --card:#fff; --line:#d9e1ec; --text:#1f2937; --muted:#607087; --accent:#1d4ed8; --error:#b91c1c; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px; }
    .hero { margin-bottom: 16px; }
    .hero h1 { margin:0 0 8px; font-size: 30px; }
    .hero p { margin:0; color:var(--muted); }
    .toolbar { display:grid; grid-template-columns: 1.5fr 1fr auto; gap:12px; margin: 18px 0; }
    input, select { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius: 10px; background:#fff; font-size:16px; }
    .status { margin: 8px 0 14px; padding: 12px 14px; border:1px solid var(--line); background:#fff; border-radius: 10px; color:var(--muted); }
    .status.error { color:var(--error); border-color:#fecaca; background:#fff7f7; }
    .summary { margin-left:auto; align-self:center; color:var(--muted); }
    .results { display:grid; gap:14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius: 14px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
    .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:8px; }
    .card-title { margin:0; font-size:22px; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; }
    .chip { font-size:12px; padding:4px 8px; border-radius:999px; background:#eef4ff; color:var(--accent); border:1px solid #cfe0ff; }
    .submeta { color:var(--muted); margin-bottom: 12px; }
    .columns { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:14px; }
    .subject-box { border:1px solid var(--line); border-radius: 12px; padding: 12px; background:#fcfdff; }
    .subject-box h3 { margin:0 0 10px; font-size:16px; }
    .subject-list { list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .subject-list li { display:grid; grid-template-columns: 72px 1fr; gap:10px; align-items:start; }
    .label { color:var(--muted); font-weight:700; }
    .note { color:var(--accent); font-size: 13px; }
    .empty { color:var(--muted); }
    @media (max-width: 760px) { .toolbar, .columns, .card-head { grid-template-columns: 1fr; display:grid; } .summary { margin-left:0; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>2026年度 全国教科書採択一覧</h1>
      <p id="headerMeta">外部 db.json を読み込みます</p>
    </section>

    <section class="toolbar">
      <input id="keyword" type="search" placeholder="都道府県・市区町村・学校名・出版社で検索" />
      <select id="prefecture">
        <option value="">すべての都道府県</option>
      </select>
      <div id="count" class="summary">0件表示</div>
    </section>

    <div id="status" class="status">データを読み込み中です...</div>
    <section id="results" class="results"></section>
  </main>

  <script src="./js/app.js?v=20260408-2"></script>
</body>
</html>
