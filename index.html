<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度 全国教科書採択一覧</title>
<style>
  :root {
    --primary: #1a5f9e;
    --primary-light: #e8f2fb;
    --secondary: #f5a623;
    --accent: #e74c3c;
    --bg: #f4f7fb;
    --card: #ffffff;
    --border: #d0dce8;
    --text: #2c3e50;
    --text-light: #6b7c93;
    --tag-public: #27ae60;
    --tag-private: #8e44ad;
    --elem-color: #2980b9;
    --jhs-color: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--primary) 0%, #0d3d6e 100%);
    color: white;
    padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  header p {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-top: 4px;
  }
  .search-bar {
    background: white;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
  }
  #searchInput {
    width: 100%;
    padding: 10px 12px 10px 36px;
    font-size: 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  #searchInput:focus {
    border-color: var(--primary);
  }
  select {
    padding: 10px 12px;
    font-size: 0.9rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    outline: none;
    background: white;
    cursor: pointer;
    font-family: inherit;
    min-width: 130px;
  }
  select:focus { border-color: var(--primary); }
  .filter-btns {
    display: flex;
    gap: 6px;
  }
  .filter-btn {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .result-info {
    padding: 10px 24px;
    font-size: 0.85rem;
    color: var(--text-light);
    background: var(--bg);
  }
  .results {
    padding: 12px 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(26,95,158,0.15);
    transform: translateY(-2px);
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-title {
    font-weight: 700;
    font-size: 0.95rem;
    flex: 1;
  }
  .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag-public { background: #eafaf1; color: var(--tag-public); border: 1px solid #a9dfbf; }
  .tag-private { background: #f5eef8; color: var(--tag-private); border: 1px solid #d7bde2; }
  .pref-tag {
    font-size: 0.72rem;
    color: var(--text-light);
    background: var(--primary-light);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .card-body { padding: 12px 16px; }
  .school-section {
    margin-bottom: 10px;
  }
  .school-section:last-child { margin-bottom: 0; }
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
  }
  .section-label.elem {
    background: #ebf5fb;
    color: var(--elem-color);
  }
  .section-label.jhs {
    background: #fdedec;
    color: var(--jhs-color);
  }
  .subjects {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .subjects.jhs {
    grid-template-columns: repeat(7, 1fr);
  }
  .subject {
    text-align: center;
    padding: 4px 2px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fafbfd;
  }
  .subject-name {
    font-size: 0.6rem;
    color: var(--text-light);
    display: block;
    margin-bottom: 2px;
  }
  .subject-pub {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text);
    display: block;
    white-space: nowrap;
  }
  .subject-pub.has-chu3 {
    color: var(--elem-color);
  }
  .chu3-note {
    font-size: 0.6rem;
    color: var(--accent);
    display: block;
    line-height: 1.2;
    margin-top: 1px;
  }
  .location-note {
    font-size: 0.72rem;
    color: var(--text-light);
    margin-top: 6px;
  }
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
    font-size: 1rem;
  }
  .no-results span {
    font-size: 2rem;
    display: block;
    margin-bottom: 12px;
  }
  @media (max-width: 600px) {
    .results { padding: 10px 12px 24px; grid-template-columns: 1fr; }
    .search-bar { padding: 12px; }
    header { padding: 14px; }
    header h1 { font-size: 1.1rem; }
    .subjects.jhs { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>

const ELEM_SUBJECTS = ['英語','算数','国語','理科','社会'];
const JHS_SUBJECTS  = ['英語','数学','国語','理科','地理','歴史','公民'];

let currentFilter = 'all';
let currentPref = '';
let currentQuery = '';

function renderCard(name, v) {
  const kind = v['種別'] || '';
  const pref = v['都道府県'] || '';
  const loc  = v['所在地'] || '';
  const elem = v['小学校'] || null;
  const jhs  = v['中学校'] || null;

  const tagHtml = kind === '公立'
    ? '<span class="tag tag-public">公立</span>'
    : '<span class="tag tag-private">国私立</span>';

  let bodyHtml = '';

  if (elem) {
    const subs = ELEM_SUBJECTS.map(s => `
      <div class="subject">
        <span class="subject-name">${s}</span>
        <span class="subject-pub">${elem[s] || '-'}</span>
      </div>`).join('');
    bodyHtml += `<div class="school-section">
      <span class="section-label elem">🏫 小学校</span>
      <div class="subjects">${subs}</div>
    </div>`;
  }

  if (jhs) {
    const subs = JHS_SUBJECTS.map(s => {
      const pub = jhs[s] || '-';
      const chu3 = jhs['英語_中3'];
      if (s === '英語' && chu3) {
        return `<div class="subject">
          <span class="subject-name">${s}</span>
          <span class="subject-pub has-chu3">${pub}</span>
          <span class="chu3-note">中3:${chu3}</span>
        </div>`;
      }
      return `<div class="subject">
        <span class="subject-name">${s}</span>
        <span class="subject-pub">${pub}</span>
      </div>`;
    }).join('');
    bodyHtml += `<div class="school-section">
      <span class="section-label jhs">📖 中学校</span>
      <div class="subjects jhs">${subs}</div>
      ${jhs['英語_中3'] ? '<p style="font-size:0.68rem;color:#e74c3c;margin-top:4px;">※英語：青=中1・2、赤=中3（旧採択）</p>' : ''}
    </div>`;
  }

  if (loc) {
    bodyHtml += `<p class="location-note">📍 ${loc}</p>`;
  }

  return `<div class="card">
    <div class="card-header">
      <span class="card-title">${name}</span>
      ${tagHtml}
      <span class="pref-tag">${pref}</span>
    </div>
    <div class="card-body">${bodyHtml}</div>
  </div>`;
}

function doSearch() {
  const query = currentQuery.trim();
  const pref  = currentPref;
  const filter = currentFilter;

  let entries = Object.entries(DB);

  // 都道府県フィルター
  if (pref) {
    entries = entries.filter(([,v]) => v['都道府県'] === pref);
  }

  // 種別フィルター
  if (filter !== 'all') {
    entries = entries.filter(([,v]) => v['種別'] === filter);
  }

  // テキスト検索（地区名・所在地・都道府県）
  if (query) {
    const q = query.toLowerCase();
    entries = entries.filter(([name, v]) =>
      name.toLowerCase().includes(q) ||
      (v['所在地'] || '').toLowerCase().includes(q)
    );
  }

  const info = document.getElementById('resultInfo');
  const container = document.getElementById('results');

  info.textContent = `${entries.length}件 表示中（全2,200件）`;

  if (entries.length === 0) {
    container.innerHTML = '<div class="no-results"><span>🔍</span>「' + (query || pref) + '」の結果が見つかりませんでした</div>';
    return;
  }

  // 最大300件表示
  const show = entries.slice(0, 300);
  container.innerHTML = show.map(([name, v]) => renderCard(name, v)).join('');

  if (entries.length > 300) {
    container.innerHTML += `<div class="no-results"><span></span>結果が多いため上位300件を表示。検索を絞り込んでください。</div>`;
  }
}

// 初期表示（都道府県未選択時は何も表示しない）
function initDisplay() {
  const info = document.getElementById('resultInfo');
  info.textContent = '都道府県を選択するか、市区町村名・学校名を入力してください（全2,200件収録）';
  document.getElementById('results').innerHTML = '';
}

// イベント
let timer;
document.getElementById('searchInput').addEventListener('input', e => {
  currentQuery = e.target.value;
  clearTimeout(timer);
  timer = setTimeout(() => {
    if (currentQuery.length >= 1 || currentPref) doSearch();
    else initDisplay();
  }, 200);
});

document.getElementById('prefSelect').addEventListener('change', e => {
  currentPref = e.target.value;
  if (currentPref || currentQuery) doSearch();
  else initDisplay();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    if (currentPref || currentQuery) doSearch();
    else initDisplay();
  });
});

initDisplay();
</script>
