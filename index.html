<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年度 全国教科書採択一覧</title>
  <style>
    :root{
      --bg:#f7f8fb;
      --card:#ffffff;
      --line:#d9dfeb;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#1d4ed8;
      --accent-bg:#eff6ff;
      --error:#b91c1c;
      --shadow:0 1px 3px rgba(0,0,0,.06);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
      color:var(--text);
      background:var(--bg);
      line-height:1.6;
    }

    .container{
      max-width:1180px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .page-header{
      margin-bottom:20px;
    }

    .page-header h1{
      margin:0 0 8px;
      font-size:32px;
      line-height:1.3;
    }

    .page-header p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .search-bar{
      display:grid;
      grid-template-columns:1.8fr 1fr auto;
      gap:12px;
      align-items:center;
      margin:18px 0 14px;
    }

    .search-bar input,
    .search-bar select{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:10px;
      background:#fff;
      font-size:15px;
    }

    .count-box{
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
    }

    .result-info{
      margin:0 0 16px;
      padding:12px 14px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:10px;
      color:var(--muted);
    }

    .result-info.error{
      border-color:#fecaca;
      color:var(--error);
      background:#fff7f7;
    }

    .results{
      display:grid;
      gap:16px;
    }

    .card,
    .result-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .card-header{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .card-title{
      margin:0;
      font-size:22px;
      line-height:1.4;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      text-align:right;
      white-space:nowrap;
    }

    .submeta{
      margin-bottom:12px;
      color:var(--muted);
      font-size:14px;
    }

    .book-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .book-box{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      background:#fcfdff;
    }

    .book-box h3{
      margin:0 0 10px;
      font-size:16px;
    }

    .subject-list{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:8px;
    }

    .subject-list li{
      display:grid;
      grid-template-columns:72px 1fr;
      gap:10px;
      align-items:start;
      padding-bottom:6px;
      border-bottom:1px dashed #e8edf5;
    }

    .subject-list li:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .subject-name{
      color:var(--muted);
      font-weight:700;
    }

    .publisher-name{
      color:var(--text);
      word-break:break-word;
    }

    .note{
      color:var(--accent);
      font-size:13px;
    }

    .empty{
      color:var(--muted);
      padding:12px 4px;
    }

    .footer-note{
      margin-top:18px;
      color:var(--muted);
      font-size:12px;
      text-align:right;
    }

    @media (max-width: 820px){
      .search-bar{
        grid-template-columns:1fr;
      }

      .card-header{
        flex-direction:column;
      }

      .meta{
        text-align:left;
        white-space:normal;
      }

      .book-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>2026年度 全国教科書採択一覧</h1>
      <p id="headerMeta">データを読み込み中です…</p>
    </header>

    <section class="search-bar">
      <input
        id="searchInput"
        type="search"
        placeholder="都道府県・市町村・学校名・出版社で検索"
        aria-label="検索"
      />
      <select id="prefectureFilter" aria-label="都道府県で絞り込み">
        <option value="">すべて</option>
      </select>
      <div id="count" class="count-box">0件</div>
    </section>

    <div id="resultInfo" class="result-info">データを読み込み中です…</div>

    <section id="results" class="results" aria-live="polite"></section>

    <div class="footer-note">JSON外部読込版</div>
  </main>

  <script src="./js/app.js?v=20260408-3"></script>
</body>
</html>
