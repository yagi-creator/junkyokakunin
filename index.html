<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度 全国教科書採択一覧</title>
<style>
  :root {
    --primary: #1a5f9e;
    --primary-light: #e8f2fb;
    --secondary: #f5a623;
    --accent: #e74c3c;
    --bg: #f4f7fb;
    --card: #ffffff;
    --border: #d0dce8;
    --text: #2c3e50;
    --text-light: #6b7c93;
    --tag-public: #27ae60;
    --tag-private: #8e44ad;
    --elem-color: #2980b9;
    --jhs-color: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--primary) 0%, #0d3d6e 100%);
    color: white;
    padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  header p {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-top: 4px;
  }
  .search-bar {
    background: white;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
  }
  #searchInput {
    width: 100%;
    padding: 10px 12px 10px 36px;
    font-size: 1rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  #searchInput:focus {
    border-color: var(--primary);
  }
  select {
    padding: 10px 12px;
    font-size: 0.9rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    outline: none;
    background: white;
    cursor: pointer;
    font-family: inherit;
    min-width: 130px;
  }
  select:focus { border-color: var(--primary); }
  .filter-btns {
    display: flex;
    gap: 6px;
  }
  .filter-btn {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .result-info {
    padding: 10px 24px;
    font-size: 0.85rem;
    color: var(--text-light);
    background: var(--bg);
  }
  .results {
    padding: 12px 24px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(26,95,158,0.15);
    transform: translateY(-2px);
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-title {
    font-weight: 700;
    font-size: 0.95rem;
    flex: 1;
  }
  .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .tag-public { background: #eafaf1; color: var(--tag-public); border: 1px solid #a9dfbf; }
  .tag-private { background: #f5eef8; color: var(--tag-private); border: 1px solid #d7bde2; }
  .pref-tag {
    font-size: 0.72rem;
    color: var(--text-light);
    background: var(--primary-light);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .card-body { padding: 12px 16px; }
  .school-section {
    margin-bottom: 10px;
  }
  .school-section:last-child { margin-bottom: 0; }
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
  }
  .section-label.elem {
    background: #ebf5fb;
    color: var(--elem-color);
  }
  .section-label.jhs {
    background: #fdedec;
    color: var(--jhs-color);
  }
  .subjects {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .subjects.jhs {
    grid-template-columns: repeat(7, 1fr);
  }
  .subject {
    text-align: center;
    padding: 4px 2px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fafbfd;
  }
  .subject-name {
    font-size: 0.6rem;
    color: var(--text-light);
    display: block;
    margin-bottom: 2px;
  }
  .subject-pub {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text);
    display: block;
    white-space: nowrap;
  }
  .subject-pub.has-chu3 {
    color: var(--elem-color);
  }
  .chu3-note {
    font-size: 0.6rem;
    color: var(--accent);
    display: block;
    line-height: 1.2;
    margin-top: 1px;
  }
  .location-note {
    font-size: 0.72rem;
    color: var(--text-light);
    margin-top: 6px;
  }
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
    font-size: 1rem;
  }
  .no-results span {
    font-size: 2rem;
    display: block;
    margin-bottom: 12px;
  }
  @media (max-width: 600px) {
    .results { padding: 10px 12px 24px; grid-template-columns: 1fr; }
    .search-bar { padding: 12px; }
    header { padding: 14px; }
    header h1 { font-size: 1.1rem; }
    .subjects.jhs { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>📚 2026年度 全国教科書採択一覧</h1>
  <p id="headerMeta">47都道府県 2,200件のデータを収録（2025年12月現在）</p>
</header>

<div class="search-bar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="市区町村名・学校名で検索..." autocomplete="off">
  </div>
  <select id="prefSelect">
    <option value="">全都道府県</option>
    <option value="北海道">北海道</option><option value="青森県">青森県</option><option value="岩手県">岩手県</option><option value="宮城県">宮城県</option><option value="秋田県">秋田県</option><option value="山形県">山形県</option><option value="福島県">福島県</option><option value="茨城県">茨城県</option><option value="栃木県">栃木県</option><option value="群馬県">群馬県</option><option value="埼玉県">埼玉県</option><option value="千葉県">千葉県</option><option value="東京都">東京都</option><option value="神奈川県">神奈川県</option><option value="新潟県">新潟県</option><option value="富山県">富山県</option><option value="石川県">石川県</option><option value="福井県">福井県</option><option value="山梨県">山梨県</option><option value="長野県">長野県</option><option value="岐阜県">岐阜県</option><option value="静岡県">静岡県</option><option value="愛知県">愛知県</option><option value="三重県">三重県</option><option value="滋賀県">滋賀県</option><option value="京都府">京都府</option><option value="大阪府">大阪府</option><option value="兵庫県">兵庫県</option><option value="奈良県">奈良県</option><option value="和歌山県">和歌山県</option><option value="鳥取県">鳥取県</option><option value="島根県">島根県</option><option value="岡山県">岡山県</option><option value="広島県">広島県</option><option value="山口県">山口県</option><option value="徳島県">徳島県</option><option value="香川県">香川県</option><option value="愛媛県">愛媛県</option><option value="高知県">高知県</option><option value="福岡県">福岡県</option><option value="佐賀県">佐賀県</option><option value="長崎県">長崎県</option><option value="熊本県">熊本県</option><option value="大分県">大分県</option><option value="宮崎県">宮崎県</option><option value="鹿児島県">鹿児島県</option><option value="沖縄県">沖縄県</option>
  </select>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="公立">公立</button>
    <button class="filter-btn" data-filter="国私立">国私立</button>
  </div>
</div>

<div class="result-info" id="resultInfo">データを読み込み中...</div>
<div class="results" id="results"></div>

<script src="./js/app.js"></script>
</body>
</html>
