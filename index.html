<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026年度 全国教科書採択一覧</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f7;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
    }

    .status {
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      background: #eef5ff;
    }

    .status.error {
      background: #ffeaea;
      color: #a33;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .meta {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .empty {
      color: #666;
      padding: 16px 0;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f6f6f6;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>2026年度 全国教科書採択一覧</h1>

    <div id="status" class="status">データを読み込み中です...</div>
    <div id="result" class="list"></div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
